name: Quality & Load Tests

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Base URL to run load tests against (e.g. https://staging.example.com)'
        required: false

jobs:
  phpunit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v3
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, sqlite, gd
      - name: Get Composer Cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
      - name: Install Composer deps
        run: composer install --no-progress --no-suggest --prefer-dist
      - name: Run Feature tests
        run: php -d extension=pdo_sqlite vendor/bin/phpunit --configuration phpunit.xml --testsuite Feature

  load-test:
    needs: phpunit
    runs-on: ubuntu-latest
    if: github.event.inputs.target_url != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run k6 load test
        uses: grafana/k6-action@v0.7.0
        with:
          script: tests/load/k6/50_concurrent_users.js
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
